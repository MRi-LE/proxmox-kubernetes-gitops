---
# .forgejo/workflows/terraform-plan.yml
# Runs `terraform plan` on every pull request targeting main.
# Posts the plan output as a workflow artifact — never auto-applies.
#
# Runner label: proxmox-infra (LXC on Proxmox with Terraform installed)
#
# Secrets (Settings → Secrets):
#   PROXMOX_VE_ENDPOINT      — https://<your-proxmox-ip>:8006
#   PROXMOX_VE_API_TOKEN     — terraform@pam!ci=<uuid>
#   RUSTFS_ACCESS_KEY
#   RUSTFS_SECRET_KEY
#   RUSTFS_ENDPOINT          — http://<your-rustfs-ip>:30293
#   PROXMOX_SSH_PRIVATE_KEY  — authorised on Proxmox host root ONLY
#   ANSIBLE_SSH_PUBLIC_KEY   — injected into K8s VMs via cloud-init ONLY
#
# Variables (Settings → Variables):
#   TF_VAR_PROXMOX_NODE
#   TF_VAR_NETWORK_GATEWAY
#   TF_VAR_NETWORK_BRIDGE
#   TF_VAR_CP01_IP
#   TF_VAR_WORKER01_IP
#   TF_VAR_WORKER02_IP
#   TF_VAR_DISK_DATASTORE
#   TF_VAR_IMAGE_DATASTORE
#   TF_VAR_PROXMOX_TLS_INSECURE

name: Terraform — Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".forgejo/workflows/terraform-plan.yml"

run-name: "TF plan — PR #${{ github.event.pull_request.number }}"

jobs:
  plan:
    runs-on: [proxmox-infra]
    timeout-minutes: 15

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_WORKING_DIR: terraform/envs/homelab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.RUSTFS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_KEY }}
          # Proxmox provider — API token + SSH into Proxmox host only
          TF_VAR_proxmox_endpoint:    ${{ secrets.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token:   ${{ secrets.PROXMOX_VE_API_TOKEN }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}
          TF_VAR_proxmox_ssh_private_key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}
          # Ansible key — public half only; Terraform injects it into VMs via cloud-init.
          # The private key is never needed by Terraform.
          TF_VAR_ansible_ssh_public_key: ${{ secrets.ANSIBLE_SSH_PUBLIC_KEY }}
        run: |
          terraform init -reconfigure -no-color \
            -backend-config="bucket=terraform-state" \
            -backend-config="key=k8s-infra/homelab/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="endpoints={s3=\"${{ secrets.RUSTFS_ENDPOINT }}\"}"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID:        ${{ secrets.RUSTFS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.RUSTFS_SECRET_KEY }}
          # Proxmox provider
          TF_VAR_proxmox_endpoint:    ${{ secrets.PROXMOX_VE_ENDPOINT }}
          TF_VAR_proxmox_api_token:   ${{ secrets.PROXMOX_VE_API_TOKEN }}
          PROXMOX_VE_SSH_PRIVATE_KEY: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}
          TF_VAR_proxmox_ssh_private_key: ${{ secrets.PROXMOX_SSH_PRIVATE_KEY }}
          # Ansible key — public half only; Terraform injects it into VMs via cloud-init.
          # The private key is never needed by Terraform.
          TF_VAR_ansible_ssh_public_key:  ${{ secrets.ANSIBLE_SSH_PUBLIC_KEY }}
          # Non-sensitive variables
          TF_VAR_proxmox_node:      ${{ vars.TF_VAR_PROXMOX_NODE }}
          TF_VAR_network_gateway:   ${{ vars.TF_VAR_NETWORK_GATEWAY }}
          TF_VAR_network_bridge:    ${{ vars.TF_VAR_NETWORK_BRIDGE }}
          TF_VAR_cp01_ip:           ${{ vars.TF_VAR_CP01_IP }}
          TF_VAR_worker01_ip:       ${{ vars.TF_VAR_WORKER01_IP }}
          TF_VAR_worker02_ip:       ${{ vars.TF_VAR_WORKER02_IP }}
          TF_VAR_disk_datastore:    ${{ vars.TF_VAR_DISK_DATASTORE }}
          TF_VAR_image_datastore:   ${{ vars.TF_VAR_IMAGE_DATASTORE }}
          TF_VAR_proxmox_tls_insecure: ${{ vars.TF_VAR_PROXMOX_TLS_INSECURE }}
        # Note: we do NOT pass -out=tfplan here.
        # Binary plan files can contain sensitive values even when the CLI
        # output redacts them. We upload only the human-readable text.
        run: |
          terraform plan -no-color 2>&1 | tee plan.txt

      - name: Upload text plan artifact
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: terraform-plan-text
          path: ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 7
