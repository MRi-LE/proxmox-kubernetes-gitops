# ansible/ansible.cfg
# Project-local Ansible configuration.
# Picked up automatically when ansible-* commands run from the ansible/ dir,
# or when ANSIBLE_CONFIG=ansible/ansible.cfg is set (as in CI).

[defaults]
inventory          = inventory/generated/hosts.yaml
roles_path         = kubespray/roles
collections_path   = ~/.ansible/collections
library            = kubespray/library

# Fact caching — speeds up repeated runs locally
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

# Output
stdout_callback    = yaml
stderr_callback    = yaml
display_skipped_hosts = false

# SSH
remote_user        = ubuntu
host_key_checking  = false
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null

retry_files_enabled = false
timeout            = 60

[privilege_escalation]
become             = true
become_method      = sudo
become_user        = root
become_ask_pass    = false

[ssh_connection]
pipelining         = true
control_path       = /tmp/ansible-ssh-%%h-%%p-%%r
