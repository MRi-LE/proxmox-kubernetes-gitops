# ansible/inventory/group_vars/all/kubespray.yml
# Kubespray-specific overrides. All keys map directly to Kubespray's group_vars.
# Keeping them here (not inside the submodule) keeps upgrades clean.

# ── Kubernetes version ────────────────────────────────────────────────────────
kube_version: v1.31.4       # matches Kubespray v2.26.0

# ── Network plugin ────────────────────────────────────────────────────────────
kube_network_plugin: calico
calico_ipip_mode: Always    # required on same L2 segment

# ── Pod / Service CIDRs ───────────────────────────────────────────────────────
kube_pods_subnet: 10.233.64.0/18
kube_service_addresses: 10.233.0.0/18
kube_network_node_prefix: 24

# ── Container runtime ─────────────────────────────────────────────────────────
container_manager: containerd

# ── DNS ───────────────────────────────────────────────────────────────────────
dns_mode: coredns
resolvconf_mode: host_resolvconf  # safe for Ubuntu 24.04 / systemd-resolved

# ── Control-plane endpoint ────────────────────────────────────────────────────
# Single CP for now — add VIP + uncomment loadbalancer line for HA later


# ── kubeadm ──────────────────────────────────────────────────────────────────
kubeadm_enabled: true

# ── Addons ───────────────────────────────────────────────────────────────────
helm_enabled: true
metrics_server_enabled: true
ingress_nginx_enabled: false   # enable later
cert_manager_enabled: false    # enable later

# ── Cluster name ─────────────────────────────────────────────────────────────
cluster_name: homelab

# ── kubelet ──────────────────────────────────────────────────────────────────
kubelet_max_pods: 110
kube_reserve_cpu: "100m"
kube_reserve_memory: "256Mi"

# ── etcd ─────────────────────────────────────────────────────────────────────
etcd_deployment_type: kubeadm  # co-located with control plane

# ── Download ─────────────────────────────────────────────────────────────────
download_run_once: true
download_localhost: false
